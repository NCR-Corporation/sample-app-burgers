apiVersion: v1
kind: Service
metadata:
    name: {{ $.Release.Namespace }}
    labels:
        app: {{ .Values.Master.App.Prefix }}-app
        version: {{ $.Chart.Version }}
        release: {{ $.Release.Name }}
    annotations:
        beta.cloud.google.com/backend-config: '{"ports": {"80":"cloud-armor-backend-config-{{ .Release.Namespace }}" }}'
spec:
    type: NodePort
    selector:
        app: {{ .Values.Master.App.Prefix }}-app
        release: {{ .Values.Master.App.ReleaseName }}
    ports:
        -   port: 80
            protocol: TCP
            targetPort: 8080
